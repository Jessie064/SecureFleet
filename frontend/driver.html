<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Driver · SecureFleet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body class="app driver">
<aside class="sidebar">
  <a href="index.html" class="brand">
    <span class="brand-mark">SF</span>
    <span class="brand-name">SecureFleet</span>
  </a>
  <nav class="sidenav">
    <a href="driver.html" class="active">My shift</a>
  </nav>
  <div class="sidefoot">
    <div id="user-chip" class="user-chip"></div>
    <button id="logout" class="btn btn-ghost btn-sm">Sign out</button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div>
      <h1>My shift</h1>
      <p class="muted">Your assigned vehicle, route, and live position.</p>
    </div>
    <span class="badge badge-green">DRIVER</span>
  </header>

  <section class="grid grid-3 stats">
    <div class="stat"><span>Vehicle</span><strong id="d-vehicle">–</strong></div>
    <div class="stat"><span>Status</span><strong id="d-status">–</strong></div>
    <div class="stat"><span>Forecast fuel</span><strong id="d-fuel">–</strong></div>
  </section>

  <section class="panel">
    <header class="panel-header">
      <h2>Map</h2>
      <button id="share-loc" class="btn btn-primary btn-sm">Share my location</button>
    </header>
    <div id="map" class="map"></div>
  </section>

  <section class="panel">
    <header class="panel-header"><h2>Today's route</h2></header>
    <div id="route-info" class="route-info muted">No route assigned.</div>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/map.js"></script>
<script src="js/driver.js"></script>
</body>
</html>
